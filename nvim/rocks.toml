[plugins."blink.cmp"]
git = "saghen/blink.cmp"
rev = "v1.8.0"

[plugins.novim-mode]
git = "tombh/novim-mode"
rev = "next"
opt = true

[plugins."telescope.nvim"]
git = "nvim-telescope/telescope.nvim"
rev = "b4da76be54691e854d3e0e02c36b0245f945c2c7"
